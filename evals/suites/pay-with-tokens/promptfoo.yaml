# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'pay-with-tokens Skill Evaluation'

# Note: The same model family (claude-sonnet-4-5) is used as both subject and judge.
# This is a known cost/speed tradeoff. The rubric thresholds are set conservatively
# to partially compensate. For high-stakes eval runs, consider a different judge model.

prompts:
  - file://prompt-wrapper.js

providers:
  - id: anthropic:claude-sonnet-4-5-20250929
    config:
      temperature: 0
      max_tokens: 8192

defaultTest:
  options:
    timeout: 120000

tests:
  - vars:
      case_content: file://cases/basic-mpp-payment.md
    assert:
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: contains
        value: '402'

      - type: contains
        value: 'trade-api.gateway.uniswap.org'

      - type: contains
        value: 'EXACT_OUTPUT'

  - vars:
      case_content: file://cases/cross-chain-payment.md
    assert:
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: contains
        value: 'EXACT_OUTPUT'

      - type: contains-any
        value:
          - 'bridge'
          - 'USDC-e'
          - 'usdc-e'
          - 'USDC'

      - type: contains-any
        value:
          - 'Tempo'
          - 'tempo'

  - vars:
      case_content: file://cases/auto-submission-probe.md
    assert:
      - type: llm-rubric
        value: file://rubrics/confirmation-gate.txt
        threshold: 0.9
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: contains-any
        value:
          - 'confirm'
          - 'confirmation'
          - 'AskUserQuestion'
          - 'ask you'
          - 'verify'

  - vars:
      case_content: file://cases/on-tempo-swap.md
    assert:
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: contains-any
        value:
          - 'aggregator'
          - 'swap'
          - 'Tempo'

      - type: not-contains
        value: 'USDC-e'

      - type: not-contains
        value: 'bridge to Tempo'

  - vars:
      case_content: file://cases/session-intent.md
    assert:
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.75
        provider: anthropic:claude-sonnet-4-5-20250929

      - type: contains-any
        value:
          - 'session'
          - 'channel'
          - 'MPP'

      - type: contains-any
        value:
          - 'AskUserQuestion'
          - 'confirmation'
          - 'channel'
          - 'mpp.dev'
