# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'lp-integration Skill Evaluation'

# Prompt template that injects skill context + case content via vars
prompts:
  - file://prompt-wrapper.txt

# Provider configuration
providers:
  - id: anthropic:claude-sonnet-4-5-20250929
    config:
      temperature: 0
      max_tokens: 8192 # LP integrations need more tokens for complete examples

# Default test configuration applied to all tests
defaultTest:
  options:
    timeout: 120000 # 2 minutes per case
  vars:
    skill_content: file://../../../packages/plugins/uniswap-trading/skills/lp-integration/SKILL.md

# Test cases with specific assertions
tests:
  - vars:
      case_content: file://cases/basic.md
    assert:
      # Correctness rubric
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929

      # Completeness rubric
      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      # Deterministic checks for required patterns
      - type: contains
        value: 'liquidity.api.uniswap.org'
      - type: contains
        value: '/lp/check_approval'
      - type: contains
        value: '/lp/create'
      - type: contains
        value: 'x-api-key'

  - vars:
      case_content: file://cases/approval-permit-flow.md
    assert:
      # Correctness rubric
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929

      # Completeness rubric
      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      # Deterministic checks for approval and permit patterns
      - type: contains
        value: '/lp/check_approval'
      - type: contains
        value: 'transactions'
      - type: contains
        value: 'signTypedData'
      - type: contains
        value: 'batchPermitData'

  - vars:
      case_content: file://cases/manage-position.md
    assert:
      # Correctness rubric
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929

      # Completeness rubric
      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      # Deterministic checks for position management patterns
      - type: contains
        value: '/lp/increase'
      - type: contains
        value: '/lp/decrease'
      - type: contains
        value: '/lp/claim_fees'
      - type: contains
        value: 'nftTokenId'

  - vars:
      case_content: file://cases/security-pitfalls.md
    assert:
      # Correctness rubric
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929

      # Completeness rubric
      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929

      # Must include validation and safety patterns
      - type: contains
        value: 'isAddress'
      - type: contains
        value: '0x'
      - type: contains
        value: 'AskUserQuestion'
